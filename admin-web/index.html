<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园点歌台管理后台</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 150;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #001529;
            color: #fff;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 99;
        }
        
        .sidebar-overlay.show {
            display: block;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-color-secondary);
        }
        
        .breadcrumb-separator {
            color: #d9d9d9;
        }
        
        .breadcrumb-current {
            color: var(--text-color);
            font-weight: 500;
        }
        
        .notification-badge {
            position: relative;
        }
        
        .notification-badge::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: var(--error-color);
            border-radius: 50%;
            border: 2px solid #fff;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-color-secondary);
            background: transparent;
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        
        .header-icon-btn:hover {
            background: var(--bg-color-component-hover);
            color: var(--primary-color);
        }
        
        .user-dropdown {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .user-dropdown:hover {
            background: var(--bg-color-component-hover);
        }
        
        .user-dropdown .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color) 0%, #69c0ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        
        .user-dropdown .name {
            font-size: 14px;
            color: var(--text-color);
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
            }
            
            .sidebar {
                transform: translateX(-100%);
                z-index: 100;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .header {
                padding-left: 60px;
            }
            
            .user-dropdown .name {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <div class="layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="logo">🎵</div>
                    <h2>校园点歌台</h2>
                    <p>管理后台 v2.0</p>
                </div>
                <nav class="sidebar-nav">
                    <a href="#dashboard" class="menu-item active" data-page="dashboard">
                        <span class="menu-icon">📊</span>
                        <span class="menu-text">数据概览</span>
                    </a>
                    <a href="#songs" class="menu-item" data-page="songs">
                        <span class="menu-icon">🎵</span>
                        <span class="menu-text">歌曲管理</span>
                    </a>
                    <a href="#audit" class="menu-item" data-page="audit">
                        <span class="menu-icon">📋</span>
                        <span class="menu-text">审核管理</span>
                    </a>
                    <a href="#play" class="menu-item" data-page="play">
                        <span class="menu-icon">▶️</span>
                        <span class="menu-text">播放控制</span>
                    </a>
                    <a href="#users" class="menu-item" data-page="users">
                        <span class="menu-icon">👥</span>
                        <span class="menu-text">用户管理</span>
                    </a>
                    <a href="#homepage" class="menu-item" data-page="homepage">
                        <span class="menu-icon">🏠</span>
                        <span class="menu-text">首页配置</span>
                    </a>
                    <a href="#blessings" class="menu-item" data-page="blessings">
                        <span class="menu-icon">💌</span>
                        <span class="menu-text">祝福管理</span>
                    </a>
                    <a href="#settings" class="menu-item" data-page="settings">
                        <span class="menu-icon">⚙️</span>
                        <span class="menu-text">系统设置</span>
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="admin-info">
                        <div class="admin-avatar">👤</div>
                        <span class="admin-name">管理员</span>
                    </div>
                    <button class="logout-btn" onclick="app.logout()">退出登录</button>
                </div>
            </aside>
            
            <main class="main-content" id="main-content">
            </main>
        </div>
        
        <header class="header">
            <div class="breadcrumb">
                <span>首页</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current" id="currentPageTitle">数据概览</span>
            </div>
            <div class="header-actions">
                <div class="header-icon-btn notification-badge" title="通知">
                    🔔
                </div>
                <div class="user-dropdown">
                    <div class="avatar">管</div>
                    <span class="name admin-name">管理员</span>
                </div>
            </div>
        </header>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>
</html>
