<div class="content">
  <div class="page-header">
    <div>
      <h2>审核管理</h2>
      <p style="color: var(--text-color-secondary); margin-top: 4px; font-size: 14px;">审核用户提交的点歌请求</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="filter-bar">
        <select id="statusFilter" style="width: 120px;" onchange="auditPage.loadData()">
          <option value="0">待审核</option>
          <option value="1">已通过</option>
          <option value="2">已拒绝</option>
          <option value="">全部</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索歌曲名或用户" style="width: 180px;" onkeyup="if(event.key==='Enter')auditPage.loadData()">
        <button class="btn btn-primary" onclick="auditPage.loadData()">
          <span>🔍</span> 搜索
        </button>
      </div>
    </div>
    
    <div class="card-body" style="padding: 0;">
      <div id="requestList">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.request-list {
  display: flex;
  flex-direction: column;
}

.request-item {
  display: flex;
  align-items: flex-start;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-color-split);
  transition: background var(--transition-fast);
  gap: 16px;
}

.request-item:last-child {
  border-bottom: none;
}

.request-item:hover {
  background: var(--bg-color-component-hover);
}

.request-song {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.request-cover {
  width: 56px;
  height: 56px;
  border-radius: 10px;
  background: linear-gradient(135deg, #f0f0f0 0%, #e8e8e8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #999;
  flex-shrink: 0;
  overflow: hidden;
}

.request-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.request-info {
  flex: 1;
  min-width: 0;
}

.request-song-name {
  font-weight: 600;
  color: var(--text-color);
  font-size: 15px;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.request-song-singer {
  font-size: 13px;
  color: var(--text-color-secondary);
}

.request-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.request-user {
  display: flex;
  align-items: center;
  gap: 6px;
}

.request-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary-color) 0%, #69c0ff 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #fff;
}

.request-nickname {
  font-size: 13px;
  color: var(--text-color-secondary);
}

.request-time {
  font-size: 12px;
  color: var(--text-color-disabled);
}

.request-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.request-blessing {
  margin-top: 12px;
  padding: 12px;
  background: #fafafa;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-color-secondary);
  line-height: 1.6;
}

.request-blessing-label {
  font-weight: 500;
  color: var(--text-color);
  margin-bottom: 4px;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-color-secondary);
}

.empty-state .icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.loading-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-color-secondary);
}

.loading-state .loading-spinner {
  margin: 0 auto 16px;
}

@media (max-width: 768px) {
  .request-item {
    flex-direction: column;
    align-items: stretch;
  }
  
  .request-meta {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-color-split);
  }
  
  .request-actions {
    width: 100%;
    margin-top: 12px;
  }
  
  .request-actions button {
    flex: 1;
  }
}
</style>

<script>
(function() {
  let currentPage = 1;
  let pageSize = 10;
  
  window.auditPage = {
    init: function() {
      this.loadData();
    },
    
    loadData: async function() {
      const status = document.getElementById('statusFilter').value;
      const keyword = document.getElementById('searchInput').value.trim();
      const container = document.getElementById('requestList');
      
      container.innerHTML = `
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>加载中...</p>
        </div>
      `;
      
      try {
        const res = await api.songRequest.getList({
          page: currentPage,
          pageSize,
          status: status !== '' ? parseInt(status) : undefined,
          keyword
        });
        
        this.renderList(res);
      } catch (error) {
        console.error('加载列表失败:', error);
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>加载失败，请重试</p>
          </div>
        `;
      }
    },
    
    renderList: function(res) {
      const container = document.getElementById('requestList');
      
      if (res.code !== 0 || !res.data || !res.data.list || res.data.list.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>暂无点歌请求</p>
          </div>
        `;
        return;
      }
      
      let html = '<div class="request-list">';
      
      res.data.list.forEach(item => {
        const statusClass = this.getStatusClass(item.status);
        const statusText = this.getStatusText(item.status);
        const avatar = (item.nickname || '匿').charAt(0);
        
        html += `
          <div class="request-item">
            <div class="request-song">
              <div class="request-cover">
                ${item.cover_url ? `<img src="${item.cover_url}" onerror="this.style.display='none';this.parentElement.innerHTML='🎵'">` : '🎵'}
              </div>
              <div class="request-info">
                <div class="request-song-name">${item.song_name || '-'}</div>
                <div class="request-song-singer">${item.singer || '未知歌手'}</div>
                ${item.blessing ? `
                  <div class="request-blessing">
                    <div class="request-blessing-label">💌 祝福语</div>
                    ${item.blessing}
                  </div>
                ` : ''}
              </div>
            </div>
            <div class="request-meta">
              <div class="request-user">
                <div class="request-avatar">${avatar}</div>
                <span class="request-nickname">${item.nickname || '匿名用户'}</span>
              </div>
              <span class="status-tag ${statusClass}">${statusText}</span>
              <span class="request-time">${this.formatTime(item.create_time)}</span>
            </div>
            <div class="request-actions">
              ${item.status === 0 ? `
                <button class="btn btn-sm btn-success" onclick="auditPage.handleAudit(${item.id}, 1)">
                  <span>✓</span> 通过
                </button>
                <button class="btn btn-sm btn-danger" onclick="auditPage.handleAudit(${item.id}, 2)">
                  <span>✕</span> 拒绝
                </button>
              ` : ''}
              <button class="btn btn-sm btn-secondary" onclick="auditPage.showDetail(${item.id})">
                详情
              </button>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      
      if (res.data.total > pageSize) {
        html += this.renderPagination(res.data.total);
      }
      
      container.innerHTML = html;
    },
    
    renderPagination: function(total) {
      const totalPages = Math.ceil(total / pageSize);
      
      let html = '<div class="pagination" style="padding: 16px 24px; border-top: 1px solid var(--border-color-split);">';
      html += `<span style="color: var(--text-color-secondary); margin-right: 12px; font-size: 13px;">共 ${total} 条</span>`;
      html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="auditPage.goToPage(${currentPage - 1})">上一页</button>`;
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="${i === currentPage ? 'active' : ''}" onclick="auditPage.goToPage(${i})">${i}</button>`;
        }
      }
      
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="auditPage.goToPage(${currentPage + 1})">下一页</button>`;
      html += '</div>';
      
      return html;
    },
    
    goToPage: function(page) {
      currentPage = page;
      this.loadData();
    },
    
    handleAudit: async function(id, status) {
      const action = status === 1 ? '通过' : '拒绝';
      
      if (!await app.confirm(`确定要${action}这个点歌请求吗？`)) {
        return;
      }
      
      try {
        const res = await api.songRequest.audit(id, { status });
        if (res.code === 0) {
          api.showSuccess(`${action}成功`);
          this.loadData();
        } else {
          api.showError(res.msg || `${action}失败`);
        }
      } catch (error) {
        console.error('审核失败:', error);
        api.showError('操作失败');
      }
    },
    
    showDetail: async function(id) {
      try {
        const res = await api.songRequest.getDetail(id);
        if (res.code === 0 && res.data) {
          const item = res.data;
          const statusText = this.getStatusText(item.status);
          
          let content = `
            <div class="detail-grid">
              <div class="detail-item">
                <span class="label">歌曲名称</span>
                <span class="value">${item.song_name || '-'}</span>
              </div>
              <div class="detail-item">
                <span class="label">歌手</span>
                <span class="value">${item.singer || '-'}</span>
              </div>
              <div class="detail-item">
                <span class="label">点歌用户</span>
                <span class="value">${item.nickname || '匿名用户'}</span>
              </div>
              <div class="detail-item">
                <span class="label">状态</span>
                <span class="value">${statusText}</span>
              </div>
              <div class="detail-item">
                <span class="label">提交时间</span>
                <span class="value">${this.formatTime(item.create_time)}</span>
              </div>
              ${item.audit_time ? `
              <div class="detail-item">
                <span class="label">审核时间</span>
                <span class="value">${this.formatTime(item.audit_time)}</span>
              </div>
              ` : ''}
            </div>
            ${item.blessing ? `
            <div style="margin-top: 16px; padding: 12px; background: #fafafa; border-radius: 8px;">
              <div style="font-weight: 500; margin-bottom: 8px;">💌 祝福语</div>
              <div style="color: var(--text-color-secondary); line-height: 1.6;">${item.blessing}</div>
            </div>
            ` : ''}
          `;
          
          app.showModal('点歌详情', content);
        }
      } catch (error) {
        api.showError('获取详情失败');
      }
    },
    
    getStatusClass: function(status) {
      const map = { 0: 'status-pending', 1: 'status-approved', 2: 'status-rejected' };
      return map[status] || '';
    },
    
    getStatusText: function(status) {
      const map = { 0: '待审核', 1: '已通过', 2: '已拒绝' };
      return map[status] || '未知';
    },
    
    formatTime: function(time) {
      if (!time) return '-';
      const date = new Date(time);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }
  };
  
  window.initAuditPage = function() {
    auditPage.init();
  };
  
  window.initAuditPage();
})();
</script>
